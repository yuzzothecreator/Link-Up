<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #0f766e; }
      .foreground { stroke: #ffffff; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #14b8a6; }
      .foreground { stroke: #042f2e; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="40" />
  <g
    class="foreground"
    transform="translate(90 90) rotate(-45) translate(-90 -90)"
    stroke-width="16"
    fill="none"
  >
    <rect x="28" y="70" width="78" height="40" rx="20" />
    <rect x="74" y="70" width="78" height="40" rx="20" />
  </g>
</svg>
